<div class="coc-panel" id="coc-panel">
    <div class="coc-header">
        <h2>COC7角色卡</h2>
        <button class="coc-close-btn" id="coc-close-panel">✖</button>
    </div>
    <div class="coc-content" id="coc-content">
        <div class="coc-tabbar">
            <button class="coc-tab-btn active" id="coc-tab-pc" data-panel="pc">角色</button>
            <button class="coc-tab-btn" id="coc-tab-npc" data-panel="npc">NPC</button>
        </div>

        <!-- 工具栏 -->
        <div class="coc-toolbar" id="coc-pc-toolbar">
            <select class="coc-select" id="coc-role-select">
                <option value="">选择角色</option>
            </select>
            <button class="coc-btn import" id="coc-import-btn">导入</button>
            <button class="coc-btn export" id="coc-export-btn">导出</button>
            <button class="coc-btn delete" id="coc-delete-btn">删除</button>
        </div>

        <!-- 角色卡片区 -->
        <div id="coc-stats-display">
            <div class="coc-empty">
                请选择角色
            </div>
        </div>

        <!-- 编辑区（默认隐藏） -->
        <div id="coc-edit-section" style="display: none;"></div>

        <!-- NPC 工具栏 -->
        <div class="coc-toolbar" id="coc-npc-toolbar" style="display: none;">
            <select class="coc-select" id="coc-npc-select">
                <option value="">选择NPC</option>
            </select>
            <button class="coc-btn import" id="coc-npc-import-btn">导入</button>
            <button class="coc-btn export" id="coc-npc-export-btn">导出</button>
            <button class="coc-btn delete" id="coc-npc-delete-btn">删除</button>
        </div>

        <div id="coc-npc-display" style="display: none;">
            <div class="coc-empty">
                请选择NPC
            </div>
        </div>

        <div id="coc-npc-edit-section" style="display: none;"></div>
    </div>
</div>
